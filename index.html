<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian — AI Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1814; --ink2: #4a4740; --ink3: #8a8780;
      --paper: #f7f4ef; --paper2: #efece6; --paper3: #e5e1d8;
      --accent: #c44a2a; --accent2: #e8683e;
      --line: rgba(26,24,20,0.12);
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    body { background: var(--paper); color: var(--ink); font-family: var(--sans); min-height: 100vh; font-size: 15px; }

    .hero { display: flex; flex-direction: column; align-items: center; padding: 3rem 1.5rem 2rem; text-align: center; transition: all 0.4s ease; }
    .hero.compact { padding: 1.25rem 1.5rem 1rem; flex-direction: row; gap: 1.25rem; text-align: left; align-items: center; border-bottom: 1px solid var(--line); }

    .logo-mark { width: 48px; height: 48px; background: var(--ink); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.4s; color: var(--paper); }
    .hero.compact .logo-mark { width: 34px; height: 34px; border-radius: 8px; }
    .logo-mark svg { width: 26px; height: 26px; }
    .hero.compact .logo-mark svg { width: 18px; height: 18px; }

    .brand { margin: 1rem 0 0.3rem; font-family: var(--serif); font-size: 2.4rem; letter-spacing: -0.02em; color: var(--ink); line-height: 1; transition: all 0.4s; }
    .hero.compact .brand { margin: 0; font-size: 1.15rem; }
    .tagline { font-size: 0.85rem; color: var(--ink3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2rem; }
    .hero.compact .tagline { display: none; }

    .search-wrap { width: 100%; max-width: 620px; }
    .hero.compact .search-wrap { max-width: none; flex: 1; }
    .search-row { display: flex; align-items: center; background: white; border: 1.5px solid var(--paper3); border-radius: 14px; padding: 10px 14px; gap: 10px; transition: border-color 0.2s, box-shadow 0.2s; }
    .search-row:focus-within { border-color: var(--ink); box-shadow: 0 2px 16px rgba(26,24,20,0.08); }
    .search-row input { flex: 1; border: none; outline: none; font-family: var(--sans); font-size: 15px; color: var(--ink); background: transparent; }
    .search-row input::placeholder { color: var(--ink3); }
    .search-row input:disabled { opacity: 0.6; }

    .search-btn { background: var(--accent); color: white; border: none; border-radius: 9px; padding: 7px 16px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; letter-spacing: 0.02em; transition: background 0.2s, transform 0.1s; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
    .search-btn:hover:not(:disabled) { background: var(--accent2); }
    .search-btn:active:not(:disabled) { transform: scale(0.97); }
    .search-btn:disabled { background: var(--ink3); cursor: not-allowed; }

    .spin { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .examples { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 1.25rem; }
    .pill { background: var(--paper2); border: 1px solid var(--paper3); border-radius: 20px; padding: 5px 13px; font-size: 12.5px; color: var(--ink2); cursor: pointer; transition: all 0.15s; user-select: none; }
    .pill:hover { background: var(--paper3); color: var(--ink); }

    .results-area { max-width: 760px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }

    .answer-block { background: white; border: 1px solid var(--line); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .answer-label { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.9rem; }
    .answer-label .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    .dot.done { animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .answer-text { font-size: 15px; line-height: 1.75; color: var(--ink); }
    .answer-text p { margin-bottom: 0.7em; }
    .answer-text p:last-child { margin-bottom: 0; }
    .answer-text strong { font-weight: 500; }
    .answer-text a { color: var(--accent); text-decoration: none; }
    .answer-text a:hover { text-decoration: underline; }
    .answer-text ul, .answer-text ol { padding-left: 1.4em; margin-bottom: 0.7em; }
    .answer-text li { margin-bottom: 0.3em; }
    .answer-text code { background: var(--paper2); padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: 'Courier New', monospace; }
    .answer-text h1, .answer-text h2, .answer-text h3 { font-family: var(--serif); font-weight: 400; margin: 1em 0 0.4em; line-height: 1.3; }
    .answer-text h1 { font-size: 1.5em; }
    .answer-text h2 { font-size: 1.25em; }
    .answer-text h3 { font-size: 1.1em; }

    .sources-section { margin-top: 1rem; }
    .sources-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 0.6rem; padding-top: 0.9rem; border-top: 1px solid var(--line); }
    .source-chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .source-chip { display: flex; align-items: center; gap: 6px; background: var(--paper2); border: 1px solid var(--paper3); border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--ink2); text-decoration: none; transition: all 0.15s; }
    .source-chip:hover { background: var(--paper3); color: var(--ink); }
    .favicon { width: 14px; height: 14px; border-radius: 3px; object-fit: contain; background: var(--paper3); }

    .followups { margin-top: 1rem; padding-top: 0.9rem; border-top: 1px solid var(--line); }
    .followups-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 0.6rem; }
    .followup-btns { display: flex; flex-wrap: wrap; gap: 7px; }
    .followup-btn { background: white; border: 1px solid var(--paper3); border-radius: 8px; padding: 6px 12px; font-family: var(--sans); font-size: 12.5px; color: var(--ink2); cursor: pointer; transition: all 0.15s; text-align: left; }
    .followup-btn:hover { border-color: var(--ink); color: var(--ink); }

    .history-panel { margin-bottom: 1rem; }
    .history-panel-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; }
    .history-clear { margin-left: auto; background: none; border: none; color: var(--ink3); font-family: var(--sans); font-size: 11px; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.15s; }
    .history-clear:hover { color: var(--accent); }
    .history-block { padding: 1rem 1.25rem; background: var(--paper2); border-radius: 12px; border-left: 3px solid var(--accent); margin-bottom: 0.6rem; transition: background 0.15s; }
    .history-block:hover { background: var(--paper3); }
    .history-q { font-size: 13.5px; font-weight: 500; color: var(--ink); margin-bottom: 0.4rem; }
    .history-a { font-size: 13px; color: var(--ink2); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .error-block { background: #fff5f3; border: 1px solid #fdc9be; border-radius: 12px; padding: 1rem 1.25rem; color: #b03a20; font-size: 14px; margin-bottom: 1rem; animation: fadeUp 0.3s ease; }
    .empty-state { text-align: center; padding: 3rem 2rem; color: var(--ink3); font-size: 13.5px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
